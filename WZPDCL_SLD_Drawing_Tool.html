<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WZPDCL Line Diagram Tool</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Times New Roman','Nikosh','NikoshBAN','Noto Sans Bengali','Segoe UI','Nirmala UI',Arial,sans-serif;background:#0d1f38}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#toolbar{display:flex;align-items:center;flex-wrap:wrap;gap:4px;padding:6px 9px;background:#112240;border-bottom:2px solid #1a3a6b;flex-shrink:0;z-index:1200}
.logo{color:#fff;font-weight:700;font-size:13px;white-space:nowrap;margin-right:3px}
.sep{width:1px;height:22px;background:#2a4a7f;margin:0 3px}
.tbtn{padding:4px 8px;border-radius:5px;border:none;cursor:pointer;font-weight:700;font-size:11px;color:#fff;background:#1a3560;transition:filter .12s;white-space:nowrap}
.tbtn:hover{filter:brightness(1.25)}
.tbtn.on{outline:2px solid #fff;outline-offset:1px}
.minit{color:#90caf9;font-size:11px}
#searchBox{display:none;align-items:center;gap:3px}
#searchInp{padding:4px 8px;border-radius:4px;border:1px solid #2a4a7f;background:#0a1e3d;color:#fff;font-size:11px;width:140px}
#main{display:flex;flex:1;overflow:hidden}
#palette{width:372px;background:#eef2f7;border-right:1px solid #c4d0e0;overflow-y:auto;padding:11px 11px 44px;flex-shrink:0;z-index:600}
.pt{color:#16365f;font-size:12.5px;font-weight:800;letter-spacing:.3px;padding:6px 2px;border-bottom:2px solid #c4d0e0;margin:13px 0 8px;text-transform:uppercase}
.pt:first-child{margin-top:0}
.tool-sec{border:1.6px solid #c4d0e0;border-radius:10px;background:#f3f7fc;padding:10px 10px 11px;margin-bottom:13px;transition:border-color .15s,background .15s,box-shadow .15s}
.tool-sec:last-child{margin-bottom:4px}
.tool-sec>.pt{margin:0 0 9px;color:#20456f}
.tool-sec.active{border-color:#e8870e;background:#fff6ea;box-shadow:0 0 0 2px rgba(232,135,14,.16)}
.tool-sec.active>.pt{color:#a8500a;border-bottom-color:#f0b878}
.seg{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.seg button{flex:1;min-width:46px;padding:7px 4px;border-radius:5px;border:1.5px solid #b3c4dc;background:#fff;color:#27466f;font-size:13px;font-weight:700;cursor:pointer}
.seg button.on{border-color:#e8870e;background:#fff3e0;color:#a8500a}
.subrow{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.subrow label{font-size:11.5px;font-weight:700;white-space:nowrap;color:#33415c}
.subrow select{flex:1;padding:5px 6px;background:#fff;color:#16243a;border:1px solid #b3c4dc;border-radius:4px;font-size:12.5px}
.condcard{border:1px solid #cdd9ea;border-radius:7px;padding:7px 8px 3px;margin:7px 0;background:#fff;box-shadow:0 1px 2px rgba(20,40,80,.05)}
.condcard-h{font-size:11px;font-weight:800;color:#16365f;margin:0 0 6px;padding:3px 7px;background:#eaf0f8;border-left:3px solid #5a86c4;border-radius:4px}
.cell-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.cell{padding:7px 1px;border-radius:6px;border:1.5px solid #b3c4dc;cursor:grab;background:#fff;text-align:center;transition:all .1s}
.cell:hover{background:#e2ebf7}
.cell.on{border-color:#ff5722;background:#ffe7e0}
.cell svg{display:block;margin:0 auto 2px}
.cell .h{font-size:10px;font-weight:700;color:#2a3954;line-height:1.15}
#poleCells .cell .h{font-size:9.5px;white-space:nowrap}
.row-item{display:flex;align-items:center;gap:9px;padding:8px 10px;margin-bottom:5px;border-radius:6px;border:1.5px solid #b3c4dc;background:#fff;cursor:pointer;transition:all .1s}
.row-item:hover{background:#e2ebf7}
.row-item.on{border-color:#ff5722;background:#ffe7e0}
.row-item svg{flex-shrink:0}
.row-item .lbl{font-size:12.5px;font-weight:700;color:#1d2c44;line-height:1.25}
#stage{flex:1;position:relative;overflow:hidden;background:#1a2535}
#map{position:absolute;inset:0;width:100%;height:100%;z-index:1}
#canvasScroll{position:absolute;inset:0;overflow:auto;z-index:2;background:#34404f;touch-action:pan-x pan-y}
#app.inputmode #palette{display:none}
@keyframes bomPoleIn{from{opacity:.2;transform:translateY(9px)}to{opacity:1;transform:none}}
#svgWrap{position:relative}
#draw{position:absolute;inset:0;z-index:3;pointer-events:none}
#draw.canvasmode{pointer-events:auto}
#draw [data-id],#draw [data-field],#draw [data-rot],#draw [data-jmph]{pointer-events:auto}
svg text{user-select:none;font-family:'Times New Roman','Nikosh','NikoshBAN','Noto Sans Bengali','Segoe UI',sans-serif}
#props{position:absolute;top:8px;right:8px;width:212px;background:rgba(13,31,56,.97);border:1px solid #1a3a6b;border-radius:7px;padding:9px;z-index:700;display:none;color:#cfd8dc;max-height:86vh;overflow-y:auto}
#props h4{color:#90caf9;font-size:11px;margin-bottom:7px;border-bottom:1px solid #1a3a6b;padding-bottom:4px}
#props label{color:#64b5f6;font-size:9.5px;display:block;margin:5px 0 2px}
#props input,#props select{width:100%;padding:4px 6px;background:#0a1e3d;color:#fff;border:1px solid #1e3f72;border-radius:3px;font-size:11px}
.delbtn{width:100%;padding:5px;margin-top:8px;background:#4a1010;color:#fff;border:1px solid #7b1a1a;border-radius:4px;cursor:pointer;font-size:11px}
#stage,#stage svg,#svgWrap,#canvasScroll,.leaflet-container,.leaflet-grab,.leaflet-interactive,.leaflet-dragging .leaflet-grab,.leaflet-dragging .leaflet-interactive{cursor:url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%2724%27%20height%3D%2724%27%3E%3Cg%20stroke-linecap%3D%27round%27%3E%3Cline%20x1%3D%2712%27%20y1%3D%273%27%20x2%3D%2712%27%20y2%3D%279%27%20stroke%3D%27%23fff%27%20stroke-width%3D%273%27%2F%3E%3Cline%20x1%3D%2712%27%20y1%3D%2715%27%20x2%3D%2712%27%20y2%3D%2721%27%20stroke%3D%27%23fff%27%20stroke-width%3D%273%27%2F%3E%3Cline%20x1%3D%273%27%20y1%3D%2712%27%20x2%3D%279%27%20y2%3D%2712%27%20stroke%3D%27%23fff%27%20stroke-width%3D%273%27%2F%3E%3Cline%20x1%3D%2715%27%20y1%3D%2712%27%20x2%3D%2721%27%20y2%3D%2712%27%20stroke%3D%27%23fff%27%20stroke-width%3D%273%27%2F%3E%3Cline%20x1%3D%2712%27%20y1%3D%273%27%20x2%3D%2712%27%20y2%3D%279%27%20stroke%3D%27%23111%27%20stroke-width%3D%271.3%27%2F%3E%3Cline%20x1%3D%2712%27%20y1%3D%2715%27%20x2%3D%2712%27%20y2%3D%2721%27%20stroke%3D%27%23111%27%20stroke-width%3D%271.3%27%2F%3E%3Cline%20x1%3D%273%27%20y1%3D%2712%27%20x2%3D%279%27%20y2%3D%2712%27%20stroke%3D%27%23111%27%20stroke-width%3D%271.3%27%2F%3E%3Cline%20x1%3D%2715%27%20y1%3D%2712%27%20x2%3D%2721%27%20y2%3D%2712%27%20stroke%3D%27%23111%27%20stroke-width%3D%271.3%27%2F%3E%3Ccircle%20cx%3D%2712%27%20cy%3D%2712%27%20r%3D%271%27%20fill%3D%27%23111%27%2F%3E%3C%2Fg%3E%3C%2Fsvg%3E") 12 12,crosshair!important}
.delbtn:hover{background:#6a1414}
#statusbar{position:absolute;bottom:8px;left:8px;background:rgba(13,31,56,.92);color:#90caf9;font-size:11px;padding:4px 11px;border-radius:5px;z-index:700;pointer-events:none;max-width:52%}
#pagebar{position:absolute;bottom:8px;right:8px;background:rgba(13,31,56,.95);border:1px solid #1a3a6b;border-radius:6px;padding:4px 7px;z-index:700;display:flex;align-items:center;gap:5px}
#pagebar button{padding:3px 8px;background:#1a3560;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:700}
#pageInd{color:#90caf9;font-size:11px;font-weight:700;min-width:62px;text-align:center}
#zoombar{position:absolute;top:8px;right:8px;background:rgba(13,31,56,.95);border:1px solid #1a3a6b;border-radius:6px;padding:3px 5px;z-index:700;display:flex;align-items:center;gap:4px}
#zoombar button{padding:2px 7px;background:#1a3560;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:700}
#zoomInd{color:#90caf9;font-size:10px;min-width:38px;text-align:center}
#legend{position:absolute;top:44px;left:8px;background:rgba(13,31,56,.96);border:1px solid #1a3a6b;border-radius:7px;padding:8px 10px;z-index:650;color:#cfd8dc;font-size:10px;max-width:240px;display:none;max-height:80vh;overflow-y:auto}
#legend h4{color:#90caf9;font-size:10.5px;margin-bottom:5px}
#legend .lr{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.leg-toggle{position:absolute;top:8px;left:8px;z-index:651}
.leaflet-container{background:#1a2535}
input.nospin::-webkit-outer-spin-button,input.nospin::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
tr.mbfilled>td{background:#daf3e1 !important;}
tr.mbfilled>td:first-child{box-shadow:inset 5px 0 0 #1b9a3e;font-weight:600;}
.mob-only{display:none}
#palBackdrop{display:none}
@media (max-width:860px){
  .mob-only{display:inline-flex!important;align-items:center}
  #toolbar{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:5px;padding:6px;scrollbar-width:thin}
  #toolbar::-webkit-scrollbar{height:5px}
  .logo{font-size:12px}
  .tbtn{padding:8px 11px;font-size:12.5px}
  #main{position:relative}
  #palette{position:absolute;top:0;left:0;height:100%;width:min(350px,90vw);transform:translateX(-106%);transition:transform .22s ease;box-shadow:3px 0 18px rgba(0,0,0,.45);z-index:1500;padding-top:46px}
  #app.palopen #palette{transform:none}
  #palBackdrop{display:block;position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:1400;opacity:0;pointer-events:none;transition:opacity .2s}
  #app.palopen #palBackdrop{opacity:1;pointer-events:auto}
  #palClose{position:absolute;top:7px;right:9px;z-index:1600;background:#c62828;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-weight:700;cursor:pointer;font-size:13px}
  .row-item{padding:11px 12px}
  select,input[type=number],input[type=text]{min-height:32px;font-size:13px}
  #zoombar,#pagebar{padding:7px 10px;gap:8px;z-index:1300}
  #pagebar button,#zoombar button{min-width:38px;min-height:38px;font-size:17px;padding:4px 8px}
  #pagebar span,#zoombar span{font-size:13px}
  #pagebar{bottom:calc(14px + env(safe-area-inset-bottom,0px));right:10px}
  #statusbar{bottom:calc(10px + env(safe-area-inset-bottom,0px));max-width:42%;font-size:10px}
  .leaflet-control-zoom a{width:36px!important;height:36px!important;line-height:34px!important;font-size:22px!important}
  #rotCtrl button{width:38px!important;height:38px!important;font-size:17px!important}
  #rotCtrl{top:8px!important;left:54px!important}
  #searchInp{width:38vw;max-width:200px}
}
@media print{
  #toolbar,#palette,#props,#statusbar,#pagebar,#zoombar,#legend,.leg-toggle,#palBackdrop,#palClose{display:none!important}
  body,html,#app,#main,#stage{height:auto!important;overflow:visible!important;background:#fff!important}
  #stage{display:none!important}#printArea{display:block!important}
  #layoutPanel,#layoutToast,#layoutLiveBox{display:none!important}
  .printpage{page-break-after:always;width:297mm;height:210mm;overflow:hidden;position:relative}
  .printpage.portrait{width:210mm;height:297mm}
  .printlogo{position:absolute;top:5mm;left:5mm;width:16mm;height:16mm;object-fit:contain;z-index:5}
  @page{size:A4 landscape;margin:0}
}
#printArea{display:none}
</style>
</head>
<body>
<div id="app">
<div id="toolbar">
  <span class="logo">⚡ WZPDCL লাইন ডায়াগ্রাম</span>
  <button class="tbtn mob-only" id="palToggle" onclick="togglePalette()" style="background:#0a5a3a">☰ টুল প্যানেল</button>
  <div class="sep"></div>
  <button class="tbtn" id="bg-canvas" onclick="setBg('canvas')">📄 ক্যানভাস</button>
  <button class="tbtn" id="bg-map" onclick="setBg('map')">🗺 ম্যাপ</button>
  <div class="sep"></div>
  <button class="tbtn" id="t-select" onclick="setTool('select')">↖ সিলেক্ট</button>
  <button class="tbtn" id="t-pan" onclick="setTool('pan')">🖐 প্যান</button>
  <button class="tbtn" id="t-conductor" onclick="setTool('conductor')">〜 কন্ডাক্টর</button>
  <button class="tbtn" id="t-road" onclick="setTool('road')">▭ রাস্তা</button>
  <button class="tbtn" id="t-river" onclick="setTool('river')">🌊 নদী</button>
  <button class="tbtn" id="t-railway" onclick="setTool('railway')">🚆 রেলওয়ে</button>
  <button class="tbtn" id="t-pbs" onclick="startPBS()" title="পিবিএস (PBS) ক্রসিং লাইন — এক বা একাধিক ভোল্টেজ নির্বাচন করে ক্যানভাসে দুটি বিন্দু ক্লিক করে আঁকুন">🔌 পিবিএস (PBS)</button>
  <button class="tbtn" id="t-guard" onclick="setTool('guard')">⌒ ক্যাচ গার্ড</button>
  <button class="tbtn" id="t-text" onclick="setTool('text')">T টেক্সট</button>
  <button class="tbtn" id="t-build" onclick="setTool('build')">🏢 ভবন</button>
  <button class="tbtn" id="t-shape" onclick="toggleShapeMenu()" title="শেপ — লাইন / আয়তক্ষেত্র / বৃত্ত / ত্রিভুজ আঁকুন (শুধু টীকা/চিহ্নিতকরণের জন্য; লিজেন্ড বা হিসাবে আসবে না)">◇ শেপ</button>
  <button class="tbtn" id="t-substation" onclick="startSubstation()" title="সাবস্টেশন — খালি জায়গায় ক্লিক করে বিদ্যমান (কালো) বা প্রস্তাবিত (সবুজ) ৩৩/১১ কেভি সাবস্টেশন বসান">🏭 সাবস্টেশন</button>
  <button class="tbtn" id="t-erase" onclick="setTool('erase')">✕ মুছুন</button>
  <div class="sep"></div>
  <button class="tbtn" onclick="toggleGrid()" id="gridBtn" style="background:#143a52">⊞ গ্রিড</button>
  <button class="tbtn" onclick="undo()" style="background:#143a52" title="Ctrl+Z">↶ আনডু</button>
  <button class="tbtn" id="locBtn" onclick="locateMe()" style="background:#0a5a3a;display:none">📍 আমার অবস্থান</button>
  <button class="tbtn" onclick="showBOM()" style="background:#5a3a0a">📋 প্রি-ওয়ার্ক মেজারমেন্ট তৈরী করুন</button>
  <button class="tbtn" onclick="pwmFinish()" style="background:#0a4a3a">📑 প্রি-ওয়ার্ক শিট</button>
  <button class="tbtn" onclick="openMaterialList()" style="background:#0a5a1e">📄 মালামালের তালিকা</button>
  <div id="searchBox"><input id="searchInp" placeholder="স্থান খুঁজুন..." onkeydown="if(event.key==='Enter')searchPlace(this.value)"/><button class="tbtn" onclick="searchPlace(document.getElementById('searchInp').value)" style="background:#0a4a6a">🔍</button></div>
  <span class="minit" id="modehint" style="margin-left:5px"></span>
  <div style="margin-left:auto;display:flex;gap:5px">
    <button class="tbtn" onclick="clearPage()" style="background:#4a1010;border:1px solid #7b1a1a">পেজ ক্লিয়ার</button>
    <button class="tbtn" onclick="saveDrawing()" style="background:#0a3a6a" title="পুরো ড্রয়িং .json ফাইলে সেভ করুন">💾 সেভ</button>
    <button class="tbtn" onclick="document.getElementById('loadFileInp').click()" style="background:#0a3a6a" title="সেভ করা .json ফাইল লোড করুন">📂 লোড</button>
    <input type="file" id="loadFileInp" accept=".json,application/json" style="display:none" onchange="loadDrawingFile(this)"/>
    <button class="tbtn" id="printBtn" onclick="doPrint()" style="background:#0a5a1e">🖨 প্রিন্ট / PDF</button>
    <button class="tbtn" id="layoutBtn" onclick="layoutPrintStart()" style="background:#0a5a1e;display:none" title="লেআউট প্রিন্ট: ম্যাপের সব জিও-রেফারেন্সড অবজেক্ট স্বয়ংক্রিয়ভাবে সবচেয়ে কম A4 ল্যান্ডস্কেপ শীটে ভাগ হবে, খালি পেজ বাদ যাবে, এবং লাইন রুট পেজ জুড়ে সোজা/মাঝ বরাবর বসবে। লিজেন্ড পেজ প্রথমে আসবে। (শুধু ম্যাপ ভিউ)">📐 লেআউট প্রিন্ট</button>
  </div>
</div>
<div id="main">
  <div id="palBackdrop" onclick="togglePalette(false)"></div>
  <div id="palette">
  <button id="palClose" class="mob-only" onclick="togglePalette(false)">✕ বন্ধ</button>
    <div class="tool-sec" id="sec-pole">
    <div class="pt">পোল / টাওয়ার</div>
    <div class="seg" id="poleCat">
      <button data-cat="existing" class="on" onclick="setPoleCat('existing')">বিদ্যমান</button>
      <button data-cat="proposed" onclick="setPoleCat('proposed')">নতুন</button>
      <button data-cat="replace" onclick="setPoleCat('replace')">প্রতিস্থাপন</button>
      <button data-cat="recover" onclick="setPoleCat('recover')">উদ্ধার</button>
    </div>
    <div id="oldSelWrap" style="display:none"></div>
    <div style="font-size:9px;color:#5572a0;margin:-2px 0 5px 1px">টেনে ছাড়ুন বা ক্লিক করে স্থাপন</div>
    <div id="poleCells"></div>
    <div style="font-size:9px;color:#5572a0;margin:5px 0 3px 1px">টাওয়ার (ভোল্টেজ অনুযায়ী)</div>
    <div class="cell-grid" id="towerCells" style="grid-template-columns:repeat(3,1fr)"></div>
    </div>
    <div class="tool-sec" id="sec-cond">
    <div class="pt">কন্ডাক্টর</div>
    <div id="condItems"></div>

function riverSVG(pts,sc,sel){
  if(!pts||pts.length<2)return '';
  const band=sel?'#9cc9ec':'#bcdcf2', flow=sel?'#1565c0':'#5a9bd4';
  const base=pts.map((p,i)=>(i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ');
  let s=`<path d="${base}" fill="none" stroke="${band}" stroke-width="${(15*sc).toFixed(1)}" stroke-linejoin="round" stroke-linecap="round"/>`;
  s+=`<path d="${base}" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="${(15*sc).toFixed(1)}" stroke-linejoin="round" stroke-linecap="round"/>`;
  const amp=2.7*sc, wl=15*sc;
  for(let seg=0;seg<pts.length-1;seg++){const A=pts[seg],B=pts[seg+1];const dx=B.x-A.x,dy=B.y-A.y,len=Math.hypot(dx,dy)||1;const px=-dy/len,py=dx/len;const n=Math.max(8,Math.round(len/(wl/3)));
    [-3.6*sc,3.6*sc].forEach((off,k)=>{let d='';for(let i=0;i<=n;i++){const t=i/n;const cx=A.x+dx*t,cy=A.y+dy*t;const w=Math.sin((t*len)/wl*2*Math.PI+(k?Math.PI:0))*amp;const X=cx+px*(off+w),Y=cy+py*(off+w);d+=(i?'L':'M')+X.toFixed(1)+' '+Y.toFixed(1);}
      s+=`<path d="${d}" fill="none" stroke="${flow}" stroke-width="${(1.05*sc).toFixed(2)}" stroke-linecap="round" opacity="0.9"/>`;});}
  return s;}
function riverLegendSym(){let d='M3 7';for(let x=3;x<=31;x+=1.5){d+=' L'+x.toFixed(1)+' '+(7+1.7*Math.sin((x-3)/28*4*Math.PI)).toFixed(2);}return `<svg width="34" height="14"><line x1="2" y1="7" x2="32" y2="7" stroke="#bcdcf2" stroke-width="7" stroke-linecap="round"/><path d="${d}" fill="none" stroke="#5a9bd4" stroke-width="1.1"/></svg>`;}
/* ───────── SUBSTATION (two windings inside a rectangle, no side leads) ───────── */
function substationSVG(cat,sc,withLabel){
  sc=sc*1.2;                                   /* icon at 120% of base size */
  const col=cat==='proposed'?'#1b8a34':'#1a1a1a';
  const r=7*sc,cc=r*0.72,pad=3.4*sc,halfW=cc+r+pad,halfH=r+pad;const sw=(1.5*sc).toFixed(2),cw=(1.35*sc).toFixed(2);
  let s=`<rect x="${(-halfW).toFixed(1)}" y="${(-halfH).toFixed(1)}" width="${(halfW*2).toFixed(1)}" height="${(halfH*2).toFixed(1)}" rx="${(2*sc).toFixed(1)}" fill="#fff" stroke="${col}" stroke-width="${sw}"/>`;
  s+=`<circle cx="${(-cc).toFixed(1)}" cy="0" r="${r.toFixed(1)}" fill="none" stroke="${col}" stroke-width="${cw}"/>`;
  s+=`<circle cx="${cc.toFixed(1)}" cy="0" r="${r.toFixed(1)}" fill="none" stroke="${col}" stroke-width="${cw}"/>`;
  /* star (wye) in left winding */
  const yv=r*0.52;
  s+=`<line x1="${(-cc).toFixed(1)}" y1="0" x2="${(-cc).toFixed(1)}" y2="${(-yv).toFixed(1)}" stroke="${col}" stroke-width="${cw}"/>`;
  s+=`<line x1="${(-cc).toFixed(1)}" y1="0" x2="${(-cc-yv*0.86).toFixed(1)}" y2="${(yv*0.5).toFixed(1)}" stroke="${col}" stroke-width="${cw}"/>`;
  s+=`<line x1="${(-cc).toFixed(1)}" y1="0" x2="${(-cc+yv*0.86).toFixed(1)}" y2="${(yv*0.5).toFixed(1)}" stroke="${col}" stroke-width="${cw}"/>`;
  /* delta in right winding */
  const t=r*0.5;
  s+=`<path d="M${cc.toFixed(1)},${(-t).toFixed(1)} L${(cc-t).toFixed(1)},${(t*0.8).toFixed(1)} L${(cc+t).toFixed(1)},${(t*0.8).toFixed(1)} Z" fill="none" stroke="${col}" stroke-width="${cw}"/>`;
  if(withLabel)s+=`<text y="${(halfH+8*sc).toFixed(1)}" font-size="${(5.7*sc).toFixed(1)}" fill="${col}" text-anchor="middle" font-weight="700" paint-order="stroke" stroke="#fff" stroke-width="${(1.7*sc).toFixed(2)}">${cat==='proposed'?'প্রস্তাবিত':'বিদ্যমান'} ৩৩/১১ কেভি সাবস্টেশন</text>`;
  return s;}
function subStationLegendSym(cat){const col=cat==='proposed'?'#1b8a34':'#1a1a1a';const lc=12.5,rc=19.5,cy=9,r=4.2,yv=r*0.52,t=r*0.5;

    `<path d="M${rc},${(cy-t).toFixed(1)} L${(rc-t).toFixed(1)},${(cy+t*0.8).toFixed(1)} L${(rc+t).toFixed(1)},${(cy+t*0.8).toFixed(1)} Z" fill="none" stroke="${col}" stroke-width="0.9"/>`+

/* ───────── ANNOTATION SHAPES (drawing aids — never in legend / BOQ) ───────── */
function shapeSVG(sh,A,B,sc,sel){

  if(sh.shape==='circle'){const cx=(A.x+B.x)/2,cy=(A.y+B.y)/2,rad=(Math.hypot(B.x-A.x,B.y-A.y)/2).toFixed(1);return `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${rad}" fill="none" stroke="${col}" stroke-width="${w}"/>`;}
  if(sh.shape==='triangle'){const apx=(minX+W/2).toFixed(1),apy=minY.toFixed(1),blx=minX.toFixed(1),bly=(minY+H).toFixed(1),brx=(minX+W).toFixed(1);return `<path d="M${apx} ${apy} L${brx} ${bly} L${blx} ${bly} Z" fill="none" stroke="${col}" stroke-width="${w}" stroke-linejoin="round"/>`;}
  return '';}
function shapeHit(sh,A,B,sc){const minX=Math.min(A.x,B.x),minY=Math.min(A.y,B.y),W=Math.abs(B.x-A.x),H=Math.abs(B.y-A.y),hw=(12*sc).toFixed(1);
  if(sh.shape==='line')return `<line x1="${A.x.toFixed(1)}" y1="${A.y.toFixed(1)}" x2="${B.x.toFixed(1)}" y2="${B.y.toFixed(1)}" stroke="#fff" stroke-opacity="0" stroke-width="${hw}"/>`;
  if(sh.shape==='circle'){const cx=(A.x+B.x)/2,cy=(A.y+B.y)/2,rad=(Math.hypot(B.x-A.x,B.y-A.y)/2).toFixed(1);return `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${rad}" fill="none" stroke="#fff" stroke-opacity="0" stroke-width="${hw}"/>`;}
  if(sh.shape==='triangle'){const apx=(minX+W/2).toFixed(1),apy=minY.toFixed(1),blx=minX.toFixed(1),bly=(minY+H).toFixed(1),brx=(minX+W).toFixed(1);return `<path d="M${apx} ${apy} L${brx} ${bly} L${blx} ${bly} Z" fill="none" stroke="#fff" stroke-opacity="0" stroke-width="${hw}"/>`;}
  return `<rect x="${minX.toFixed(1)}" y="${minY.toFixed(1)}" width="${W.toFixed(1)}" height="${H.toFixed(1)}" fill="#fff" fill-opacity="0" stroke="#fff" stroke-opacity="0" stroke-width="${hw}"/>`;}
/* shape picker menu off the toolbar button */
function toggleShapeMenu(){let m=document.getElementById('shapeMenu');if(m){m.remove();return;}

function legendTableSVG(P){
  const rows=genLegendRows();
  let s=`<text x="${P.w/2}" y="158" font-size="15" fill="#1565c0" font-weight="700" text-anchor="middle">প্রতীক তালিকা (Legend)</text>`;
  if(!rows.length){s+=`<text x="${P.w/2}" y="${(P.h*0.40).toFixed(0)}" font-size="39" fill="#b3bcc6" text-anchor="middle" font-style="italic"><tspan x="${P.w/2}" dy="0">পরের পেজ থেকে বা গুগল ম্যাপে অঙ্কণ শুরু করুন।</tspan><tspan x="${P.w/2}" dy="62">আপনি যা আঁকবেন, সেই অনুযায়ী প্রতীক তালিকা</tspan><tspan x="${P.w/2}" dy="62">এখানে স্বয়ংক্রিয়ভাবে যুক্ত হতে থাকবে।</tspan></text>`;return s;}
  /* ── balanced, space-filling multi-column layout ── */
  const N=rows.length;
  const areaTop=176,areaLeft=34,areaRight=P.w-34,areaBottom=P.h-30;
  const areaW=areaRight-areaLeft,areaH=Math.max(60,areaBottom-areaTop);
  let maxLbl=0;rows.forEach(r=>{const L=(r.label||'').length;if(L>maxLbl)maxLbl=L;});
  const itemMinW=Math.round(44+maxLbl*6.4+14);
  const maxColW=Math.max(270,itemMinW);
  const baseRH=20;
  const maxRowsByH=Math.max(1,Math.floor(areaH/baseRH));
  const maxColsByW=Math.max(1,Math.floor(areaW/itemMinW));
  const colsToFit=Math.ceil(N/maxRowsByH);
  const minColsByCap=Math.max(1,Math.ceil(areaW/maxColW));
  let cols=Math.min(Math.max(colsToFit,minColsByCap,1),maxColsByW);cols=Math.max(1,Math.min(cols,N));
  const base=Math.floor(N/cols),rem=N%cols,maxRows=base+(rem>0?1:0);
  let rh=Math.max(14,Math.min(baseRH,Math.floor(areaH/maxRows)));
  const symH=Math.min(18,rh-2),labelDY=Math.round(rh*0.72),fs=rh>=17?9.5:8.5;
  let colW=areaW/cols;if(colW>maxColW)colW=maxColW;
  const blockW=cols*colW,blockH=maxRows*rh;
  const startX=areaLeft+Math.max(0,(areaW-blockW)/2);
  const startY=areaTop+Math.max(0,(areaH-blockH)/2);
  let idx=0;
  for(let c=0;c<cols;c++){const cnt=base+(c<rem?1:0);
    for(let r=0;r<cnt;r++){const it=rows[idx++];if(!it)break;
      const x=startX+c*colW,y=startY+r*rh;
      s+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${(colW-4).toFixed(1)}" height="${(rh-3).toFixed(1)}" fill="${r%2?'#f6f8fb':'#fff'}" stroke="#e4e8ee" stroke-width="0.5"/>`;
      s+=`<g transform="translate(${(x+4).toFixed(1)},${(y+1).toFixed(1)})">${it.svg.replace('<svg',`<svg height="${symH}"`)}</g>`;
      s+=`<text x="${(x+44).toFixed(1)}" y="${(y+labelDY).toFixed(1)}" font-size="${fs}" fill="#222">${esc(it.label)}</text>`;
    }
  }
  return s;
}

function ptSegD(px,py,x1,y1,x2,y2){const dx=x2-x1,dy=y2-y1;const L2=dx*dx+dy*dy||1;let t=((px-x1)*dx+(py-y1)*dy)/L2;t=Math.max(0,Math.min(1,t));const cx=x1+t*dx,cy=y1+t*dy;return Math.hypot(px-cx,py-cy);}
function chooseTxSide(d,paId,pbId){const a=d.poles.find(p=>p.id===paId),b=d.poles.find(p=>p.id===pbId);if(!a||!b)return 90;
  if(!(d.roads&&d.roads.length))return 90;
  const sc=scaleNow();const pa=screenOf(a),pb=screenOf(b);const base=Math.atan2(pb.y-pa.y,pb.x-pa.x)*180/Math.PI;
  const mx=(pa.x+pb.x)/2,my=(pa.y+pb.y)/2;const off=33*sc,T=20*sc;
  const rdist=(px,py)=>{let md=1e18;d.roads.forEach(rd=>{const pts=rd.pts.map(screenOf);for(let i=1;i<pts.length;i++){md=Math.min(md,ptSegD(px,py,pts[i-1].x,pts[i-1].y,pts[i].x,pts[i].y));}});return md;};
  const sideDist=ro=>{const dir=(base+ro+180)*Math.PI/180;return rdist(mx+Math.cos(dir)*off,my+Math.sin(dir)*off);};
  /* pick the side whose transformer body does NOT land on a road; if one clear & one on-road → clear side; else default(90) */
  const dA=sideDist(90),dB=sideDist(-90);const aClear=dA>=T,bClear=dB>=T;
  if(aClear&&!bClear)return 90;if(bClear&&!aClear)return -90;return 90;}
/* conductor direction (screen) at a pole, for single-phase axis ⊥ to it */
function poleCondInfoScreen(d,poleId,sp){const conds=d.conductors||[];let best=null;
  conds.forEach(c=>{let other=null;if(c.a&&c.a.poleId===poleId)other=c.b;else if(c.b&&c.b.poleId===poleId)other=c.a;if(!other)return;let op;if(other.poleId){const o=d.poles.find(p=>p.id===other.poleId);if(!o)return;op=screenOf(o);}else op=screenOf(other);const dx=op.x-sp.x,dy=op.y-sp.y,len=Math.hypot(dx,dy);if(len<1)return;const pref=(c.volt==='11')?2:(c.volt==='33'?1:0);if(!best||pref>best.pref)best={angle:Math.atan2(dy,dx)*180/Math.PI,len,pref};});
  return best;}
/* single-phase transformer: axis ⊥ to conductor, body on side that does NOT land on a road */
function txSinglePoleRot(d,poleId){const pole=d.poles.find(p=>p.id===poleId);if(!pole)return 90;const sc=scaleNow();const sp=screenOf(pole);
  const info=poleCondInfoScreen(d,poleId,sp);const baseAng=info?info.angle:0;const cand=[baseAng+90,baseAng-90];
  if(!(d.roads&&d.roads.length))return cand[0];
  const off=33*sc,T=20*sc;
  const rdist=(px,py)=>{let md=1e18;d.roads.forEach(rd=>{const pts=rd.pts.map(screenOf);for(let i=1;i<pts.length;i++){md=Math.min(md,ptSegD(px,py,pts[i-1].x,pts[i-1].y,pts[i].x,pts[i].y));}});return md;};
  const dists=cand.map(r=>{const dir=(r+180)*Math.PI/180;return rdist(sp.x+Math.cos(dir)*off,sp.y+Math.sin(dir)*off);});
  const aClear=dists[0]>=T,bClear=dists[1]>=T;
  if(aClear&&!bClear)return cand[0];if(bClear&&!aClear)return cand[1];return cand[0];}

function nearestOnLines(scr,lines){if(!lines)return null;let best=null,bd=16*16;
  lines.forEach(rd=>{for(let i=0;i<rd.pts.length-1;i++){const a=screenOf(rd.pts[i]),b=screenOf(rd.pts[i+1]);const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy||1;let t=((scr.sx-a.x)*dx+(scr.sy-a.y)*dy)/l2;t=Math.max(0,Math.min(1,t));const px=a.x+t*dx,py=a.y+t*dy,dist=(px-scr.sx)**2+(py-scr.sy)**2;if(dist<bd){bd=dist;best=screenToStore(px,py);}}});return best;}
function nearestOnRoads(scr){const d=doc();if(!d)return null;return nearestOnLines(scr,d.roads);}
function nearestOnRivers(scr){const d=doc();if(!d)return null;return nearestOnLines(scr,d.rivers);}
function nudgeOffRoad(pos){const d=doc();if(!d||!d.roads.length)return pos;const sp=screenOf(pos);const sc=scaleNow();const need=8*sc+12*sc;
  let bd=1e9,bnx=0,bny=0,found=false;
  d.roads.forEach(rd=>{for(let i=0;i<rd.pts.length-1;i++){const a=screenOf(rd.pts[i]),b=screenOf(rd.pts[i+1]);const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy||1;let t=((sp.x-a.x)*dx+(sp.y-a.y)*dy)/l2;t=Math.max(0,Math.min(1,t));const px=a.x+t*dx,py=a.y+t*dy,dist=Math.hypot(px-sp.x,py-sp.y);if(dist<bd){bd=dist;bnx=sp.x-px;bny=sp.y-py;found=true;}}});

   (self-contained: screen-aligned viewport, A4 grid, empty-page culling,

/* Page geometry — LANDSCAPE only.  Same ground scale as the geographic

  const mpp=Math.max(1e-6, map.distance(c,e)/100);            // ground m per screen px (isotropic)

    toM:(lat,lng)=>{const p=map.latLngToContainerPoint([lat,lng]);return{x:(p.x-o.x)*mpp,y:(p.y-o.y)*mpp};},
    toLL:(x,y)=>{const ll=map.containerPointToLatLng(L.point(o.x+x/mpp,o.y+y/mpp));return{lat:ll.lat,lng:ll.lng};},
    pxToM:(px,py)=>({x:(px-o.x)*mpp,y:(py-o.y)*mpp})};

     is what stops label tails being clipped at the drawing extremes. */
  const addPart=(x,y,hw,hh,pen)=>{parts.push({x:x,y:y,hw:hw,hh:hh,pen:pen});
    geoms.push({type:'pt',x:x-hw,y:y-hh},{type:'pt',x:x+hw,y:y-hh},{type:'pt',x:x-hw,y:y+hh},{type:'pt',x:x+hw,y:y+hh});};

  /* CATEGORY B — PROTECTED : poles (incl. struts / H-pole footprints) */
  (pg.poles||[]).forEach(pl=>{if(pl.lat==null)return;const m=M.toM(pl.lat,pl.lng);
    geoms.push({type:'pt',x:m.x,y:m.y});
    addPart(m.x,m.y,12*mpp,12*mpp,100);                                    // symbol footprint
    if(pl.label)addPart(m.x,m.y,Math.min(38,(String(pl.label).length*3.6+7))*mpp,11*mpp,50); // label box (true width)
  });
  /* CATEGORY B — PROTECTED : transformers / switches / capbanks (equips) */
  (pg.equips||[]).forEach(eq=>{let ll=null;
    if(eq.poleA&&eq.poleB){const a=(pg.poles||[]).find(p=>p.id===eq.poleA),b=(pg.poles||[]).find(p=>p.id===eq.poleB);if(a&&b&&a.lat!=null&&b.lat!=null)ll={lat:(a.lat+b.lat)/2,lng:(a.lng+b.lng)/2};}
    else if(eq.poleId){const p=(pg.poles||[]).find(x=>x.id===eq.poleId);if(p&&p.lat!=null)ll={lat:p.lat,lng:p.lng};}
    else if(eq.lat!=null)ll={lat:eq.lat,lng:eq.lng};
    if(!ll)return;const m=M.toM(ll.lat,ll.lng);geoms.push({type:'pt',x:m.x,y:m.y});
    addPart(m.x,m.y,22*mpp,22*mpp,100);                                    // symbol footprint
    if(eq.kva)addPart(m.x,m.y,34*mpp,20*mpp,50);                           // kVA annotation
  });
  /* CATEGORY B — PROTECTED : free text / building labels */
  (pg.texts||[]).forEach(t=>{if(t.lat==null)return;const m=M.toM(t.lat,t.lng);geoms.push({type:'pt',x:m.x,y:m.y});
    /* BBOX FIX: the label box extends to the RIGHT of its anchor (rect x=0,
       width=w) and may carry a user rotation — take the true rotated AABB
       instead of a half-width box centred on the anchor. */
    const wpx=((t.text||'').length*6.3+20),rr=(t.rot||0)*Math.PI/180,cs=Math.cos(rr),sn=Math.sin(rr);
    let X0=1e9,Y0=1e9,X1=-1e9,Y1=-1e9;
    [[0,-13],[wpx,-13],[wpx,6],[0,6]].forEach(c=>{const rx=c[0]*cs-c[1]*sn,ry=c[0]*sn+c[1]*cs;
      if(rx<X0)X0=rx;if(rx>X1)X1=rx;if(ry<Y0)Y0=ry;if(ry>Y1)Y1=ry;});
    addPart(m.x+(X0+X1)/2*mpp,m.y+(Y0+Y1)/2*mpp,(X1-X0)/2*mpp,(Y1-Y0)/2*mpp,50);
  });

  /* CATEGORY B — PROTECTED : substations (windings box) */
  (pg.substations||[]).forEach(sb=>{if(sb.lat==null&&sb.x==null)return;const m=M.toM(sb.lat!=null?sb.lat:null,sb.lat!=null?sb.lng:null);if(sb.lat==null)return;geoms.push({type:'pt',x:m.x,y:m.y});addPart(m.x,m.y,20*mpp,16*mpp,100);});
  /* annotation SHAPES — counted as content so they still print, but never penalised */
  (pg.shapes||[]).forEach(sh=>{if(!sh.a||!sh.b||sh.a.lat==null||sh.b.lat==null)return;const a=M.toM(sh.a.lat,sh.a.lng),b=M.toM(sh.b.lat,sh.b.lng);geoms.push({type:'seg',a,b});
    /* NO-CUT: protect compact shapes (ভবন etc.) whole; shapes larger than
       half a page must stay splittable or layout could become impossible. */
    const hw=Math.abs(a.x-b.x)/2,hh=Math.abs(a.y-b.y)/2;
    if(hw*2<Wm2&&hh*2<Hm2)addPart((a.x+b.x)/2,(a.y+b.y)/2,hw+4*mpp,hh+4*mpp,60);
  });
  (pg.condlabels||[]).forEach(o=>{if(o.lat==null)return;const m=M.toM(o.lat,o.lng);geoms.push({type:'pt',x:m.x,y:m.y});
    addPart(m.x,m.y,25*mpp,18*mpp,40);                                     // conductor label block
  });
  /* BBOX FIX: accessories (আনুষঙ্গিক) were missing entirely — terminals,
     earthing, stays (with their arrow targets) and hang-stays now count as
     printable content with protected footprints. */
  (pg.accs||[]).forEach(ac=>{
    const A=_ll(ac);if(A){const m=M.toM(A.lat,A.lng);geoms.push({type:'pt',x:m.x,y:m.y});
      const ext=(ac.type==='earth'||ac.type==='tearth')?14:12;
      addPart(m.x,m.y,ext*mpp,ext*mpp,50);
      if(ac.to){const T=_ll(ac.to);if(T){const tm=M.toM(T.lat,T.lng);geoms.push({type:'seg',a:m,b:tm});addPart(tm.x,tm.y,9*mpp,9*mpp,30);}}
    }
    if(ac.poleA&&ac.poleB)segLL(_ll({poleId:ac.poleA}),_ll({poleId:ac.poleB}));
  });

  /* CATEGORY A — SPLITTABLE : may cross page boundaries (penalty 0) */
  (pg.conductors||[]).forEach(c=>{segLL(_ll(c.a),_ll(c.b));
    /* BBOX FIX: "To/From ..." continuation text sits beyond the free end */
    if(c.cont){const E=_ll(c.cont.dir==='out'?c.b:c.a);if(E){const e=M.toM(E.lat,E.lng);addPart(e.x,e.y,55*mpp,12*mpp,30);}}
  });
  /* NO-CUT: jumpers are short — protect them whole (footprint = AABB of the
     span plus loop sag allowance) in addition to their splittable segment. */
  (pg.jumpers||[]).forEach(j=>{
    if(j.aCond){ /* JUMPER FIX: modern jumpers live AT their shared pole; footprint = pole ± loop extent (anchors ≤28px + handle offset) */
      const pl=(pg.poles||[]).find(p=>p.id===j.pole);if(!pl||pl.lat==null)return;
      const m=M.toM(pl.lat,pl.lng);geoms.push({type:'pt',x:m.x,y:m.y});
      const ex=(30+Math.abs((j.md&&j.md.dx)||0))*mpp,ey=(30+Math.abs((j.md&&j.md.dy)||20))*mpp;
      addPart(m.x,m.y,ex,ey,60);return;
    }
    const A=_ll(j.a)||j.a,B=_ll(j.b)||j.b;segLL(A,B);
    if(A&&B&&A.lat!=null&&B.lat!=null){const a=M.toM(A.lat,A.lng),b=M.toM(B.lat,B.lng);
      addPart((a.x+b.x)/2,(a.y+b.y)/2,Math.abs(a.x-b.x)/2+10*mpp,Math.abs(a.y-b.y)/2+14*mpp,60);}
  });
  (pg.guards||[]).forEach(g=>segLL(_ll(g.a),_ll(g.b)));
  (pg.ugcables||[]).forEach(u=>{const A=_ll(u.a),B=_ll(u.b);segLL(A,B);
    /* NO-CUT: the UG-cable spec label sits at the span midpoint */
    if(A&&B&&A.lat!=null&&B.lat!=null){const a=M.toM(A.lat,A.lng),b=M.toM(B.lat,B.lng);
      addPart((a.x+b.x)/2,(a.y+b.y)/2,25*mpp,14*mpp,40);}
  });
  (pg.pbs||[]).forEach(p=>{if(p.pts&&p.pts.length>=2)segLL(p.pts[0],p.pts[1]);});
  (pg.railways||[]).forEach(r=>{if(r.pts&&r.pts.length>=2)segLL(r.pts[0],r.pts[1]);});
  (pg.roads||[]).forEach(rd=>{if(rd.pts)for(let i=1;i<rd.pts.length;i++)segLL(rd.pts[i-1],rd.pts[i]);});
  (pg.rivers||[]).forEach(rv=>{if(rv.pts)for(let i=1;i<rv.pts.length;i++)segLL(rv.pts[i-1],rv.pts[i]);});
  /* SHEET ORDER: locate pole "P1" (or the first geo-referenced pole) so sheet
     numbering can start on its page. */
  let p1=null;const gp=(pg.poles||[]).filter(p=>p.lat!=null);
  if(gp.length){const named=gp.find(p=>/^p0*1$/i.test((p.label||'').trim()));const src=named||gp[0];p1=M.toM(src.lat,src.lng);}
  return {geoms,parts,p1};
}

/* Does a candidate A4 cell (with overlap margin) contain ANY printable? */
function layoutCellHasContent(x0,y0,dims,pr){
  const ex0=x0-dims.ovX,ey0=y0-dims.ovY,ex1=x0+dims.Wm+dims.ovX,ey1=y0+dims.Hm+dims.ovY;
  for(const g of pr.geoms){
    if(g.type==='pt'){if(g.x>=ex0&&g.x<=ex1&&g.y>=ey0&&g.y<=ey1)return true;}
    else if(_segRect(g.a.x,g.a.y,g.b.x,g.b.y,ex0,ey0,ex1,ey1))return true;
  }
  return false;
}

/* Build the candidate A4 grid for a viewport, grid origin shifted by
   (offX,offY) metres.  The grid is guaranteed to FULLY COVER the viewport
   plus the footprint of any protected object that touches its edge (so an
   element drawn right at the border is never dropped).  Empty pages are
   then eliminated, so no blank sheet survives.                            */
function layoutCells(M,vp,dims,offX,offY,pr){
  const {stepX,stepY,Wm,Hm}=dims;
  /* region = viewport ∪ footprints of protected parts intersecting it */
  let rMinX=vp.x0,rMinY=vp.y0,rMaxX=vp.x1,rMaxY=vp.y1;
  for(const p of pr.parts){
    const inX=(p.x+p.hw>vp.x0)&&(p.x-p.hw<vp.x1), inY=(p.y+p.hh>vp.y0)&&(p.y-p.hh<vp.y1);
    if(inX&&inY){rMinX=Math.min(rMinX,p.x-p.hw);rMaxX=Math.max(rMaxX,p.x+p.hw);rMinY=Math.min(rMinY,p.y-p.hh);rMaxY=Math.max(rMaxY,p.y+p.hh);}
  }
  let ox0=rMinX+offX; if(ox0>rMinX)ox0-=stepX;        // keep left/top edge covered for +offsets
  let oy0=rMinY+offY; if(oy0>rMinY)oy0-=stepY;
  const cols=Math.max(1,Math.ceil((rMaxX-Wm-ox0)/stepX)+1);  // last cell's far edge ≥ region max
  const rows=Math.max(1,Math.ceil((rMaxY-Hm-oy0)/stepY)+1);
  /* Single-cell axis → CENTRE the band so a thin line sits mid-page with
     symmetric margins (no top-heavy drift). Multi-cell axis keeps the
     edge-covering origin so nothing at a seam is dropped.                    */
  const originX=(cols===1)?((rMinX+rMaxX)/2-Wm/2+offX):ox0;
  const originY=(rows===1)?((rMinY+rMaxY)/2-Hm/2+offY):oy0;
  const cells=[];
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const x0=originX+c*stepX, y0=originY+r*stepY;
    if(layoutCellHasContent(x0,y0,dims,pr)){const cen=M.toLL(x0+Wm/2,y0+Hm/2);cells.push({x0,y0,cenLat:cen.lat,cenLng:cen.lng});}
  }
  return cells;
}

/* Step 7 — penalty: a protected part is SAFE if some single page fully
   contains it (overlapping pages give it a chance). Otherwise it is a cut. */
function layoutScore(cells,parts,dims){
  const {Wm,Hm}=dims;let pen=0,cuts=0;
  for(const p of parts){
    const px0=p.x-p.hw,px1=p.x+p.hw,py0=p.y-p.hh,py1=p.y+p.hh;
    let printed=false,safe=false;
    for(const cl of cells){
      const cx0=cl.x0,cx1=cl.x0+Wm,cy0=cl.y0,cy1=cl.y0+Hm;
      if(px1>cx0&&px0<cx1&&py1>cy0&&py0<cy1){printed=true;
        if(px0>=cx0&&px1<=cx1&&py0>=cy0&&py1<=cy1){safe=true;break;}}
    }
    if(printed&&!safe){pen+=p.pen;cuts++;}
  }
  return {pen,cuts};
}

/* SHEET ORDER: renumber cells so sheet 1 is the page containing pole P1 and
   the rest follow by increasing distance from it (deterministic tie-break on
   grid position) — a feeder therefore numbers outward from its source. */
function layoutOrderSheets(cells,pr,dims){
  if(!pr||!pr.p1||cells.length<2)return cells;
  const {Wm,Hm}=dims,p=pr.p1;
  cells.sort((a,b)=>{
    const da=Math.hypot(a.x0+Wm/2-p.x,a.y0+Hm/2-p.y),db=Math.hypot(b.x0+Wm/2-p.x,b.y0+Hm/2-p.y);
    if(Math.abs(da-db)>1e-6)return da-db;
    if(Math.abs(a.y0-b.y0)>1e-6)return a.y0-b.y0;
    return a.x0-b.x0;
  });
  return cells;
}

/* Step 8 — auto-shift: test grid offsets, pick the lowest-penalty layout. */
function layoutOptimize(M,vp,dims,pr){
  const offs=[-50,-25,0,25,50];let best=null;
  for(const ox of offs)for(const oy of offs){
    const cells=layoutCells(M,vp,dims,ox,oy,pr);if(!cells.length)continue;
    const sc=layoutScore(cells,pr.parts,dims);
    const cand={cells,ox,oy,pen:sc.pen,cuts:sc.cuts,pages:cells.length};
    const better=!best||cand.pen<best.pen
      ||(cand.pen===best.pen&&cand.cuts<best.cuts)
      ||(cand.pen===best.pen&&cand.cuts===best.cuts&&cand.pages<best.pages)
      ||(cand.pen===best.pen&&cand.cuts===best.cuts&&cand.pages===best.pages&&(Math.abs(ox)+Math.abs(oy))<(Math.abs(best.ox)+Math.abs(best.oy)));
    if(better)best=cand;
  }
  return best;
}

/* ── UI: start / draw / recompute / preview / print / cancel ─────────── */
function layoutToast(msg){let t=document.getElementById('layoutToast');if(!t){t=document.createElement('div');t.id='layoutToast';t.style.cssText='position:fixed;left:50%;top:64px;transform:translateX(-50%);z-index:99998;background:rgba(10,30,61,.95);color:#fff;border:1px solid #1565c0;border-radius:8px;padding:8px 14px;font:13px Nikosh,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.35)';document.body.appendChild(t);}t.textContent=msg;}

/* Viewport-INDEPENDENT metre projection, rotatable by theta (deg). Local
   equirectangular about (lat0,lng0): x=east, y=down(south), then rotated by
   theta. Mirrors the layoutProj interface (toM/toLL) so the optimizer and
   renderer work unchanged — but it does NOT depend on the live map view.   */
function layoutProjGeo(lat0,lng0,thetaDeg){
  const R=6378137,DEG=Math.PI/180,coslat=Math.max(1e-6,Math.cos(lat0*DEG));
  const th=thetaDeg*DEG,ct=Math.cos(th),st=Math.sin(th);
  return {mpp:1,deg:thetaDeg,
    toM:function(lat,lng){const e=(lng-lng0)*coslat*DEG*R,n=(lat-lat0)*DEG*R;const x0=e,y0=-n;return{x:x0*ct-y0*st,y:x0*st+y0*ct};},
    toLL:function(x,y){const e=ct*x+st*y,n=st*x-ct*y;return{lat:lat0+n/(DEG*R),lng:lng0+e/(coslat*DEG*R)};},
    pxToM:function(px,py){return{x:px,y:py};}};
}
/* Auto-layout: choose the rotation (always landscape A4, fixed scale) that
   needs the FEWEST sheets, computed straight from the poles' real coordinates
   (viewport-independent → no offset).                                        */
function layoutAuto(){
  if(state.bg!=='map'){alert('লেআউট প্রিন্ট শুধু ম্যাপ ভিউতে কাজ করে। উপরে "ম্যাপ" নির্বাচন করুন।');return;}
  layoutCancel(true);
  const pg=state.mapDoc;const poles=(pg.poles||[]).filter(p=>p.lat!=null);
  if(!poles.length){alert('কোনো জিও-রেফারেন্সড পোল নেই — লেআউট প্রিন্ট তৈরি করা যাচ্ছে না।');return;}
  let sLat=0,sLng=0;poles.forEach(p=>{sLat+=p.lat;sLng+=p.lng;});const lat0=sLat/poles.length,lng0=sLng/poles.length;
  const dims=layoutDims();
  const evalDeg=function(deg){const M=layoutProjGeo(lat0,lng0,deg);const pr=getPrintables(pg,M,dims.mpp);
    let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
    pr.geoms.forEach(g=>{if(g.type==='pt'){if(g.x<x0)x0=g.x;if(g.x>x1)x1=g.x;if(g.y<y0)y0=g.y;if(g.y>y1)y1=g.y;}else{const q=[g.a,g.b];q.forEach(p=>{if(p.x<x0)x0=p.x;if(p.x>x1)x1=p.x;if(p.y<y0)y0=p.y;if(p.y>y1)y1=p.y;});}});
    if(!isFinite(x0))return null;
    /* BBOX FIX: uniform breathing margin around the whole drawing (~7 mm on
       paper) so nothing sits flush against a page edge. Applied BEFORE cell
       packing, so the blue viewport box and the sheets both honour it. */
    const pad=26*dims.mpp;
    x0-=pad;y0-=pad;x1+=pad;y1+=pad;
    const vp={x0:x0,y0:y0,x1:x1,y1:y1};const cand=layoutOptimize(M,vp,dims,pr);if(!cand)return null;return {cand:cand,M:M,pr:pr,vp:vp,deg:deg,yext:(y1-y0)};};
  /* Evaluate every rotation, then choose:
     • fewest sheets always wins (primary);
     • among those, fewest protected cuts;
     • THEN — if the network is essentially a thin LINE (its tightest
       perpendicular spread fits one page), orient it HORIZONTAL (min spread)
       so it runs centred across the sheets; otherwise it is a 2-D network, so
       keep it NORTH-UP (smallest rotation) for readability.                  */
  const cands=[];
  for(let deg=0;deg<180;deg+=2){const r=evalDeg(deg);if(r)cands.push(r);}
  if(!cands.length){alert('লেআউট গণনা ব্যর্থ হয়েছে।');return;}
  let minPages=Infinity;cands.forEach(c=>{if(c.cand.pages<minPages)minPages=c.cand.pages;});
  let pool=cands.filter(c=>c.cand.pages===minPages);
  let minCuts=Infinity;pool.forEach(c=>{if(c.cand.cuts<minCuts)minCuts=c.cand.cuts;});
  pool=pool.filter(c=>c.cand.cuts===minCuts);
  let yMin=Infinity;pool.forEach(c=>{if(c.yext<yMin)yMin=c.yext;});
  const lineMode=yMin<dims.Hm;                    // fits one page tall ⇒ it is a line
  let best=pool[0];
  for(const c of pool){
    if(lineMode){ if(c.yext<best.yext-0.5||(Math.abs(c.yext-best.yext)<=0.5&&c.cand.pen<best.cand.pen))best=c; }
    else { const rc=Math.min(c.deg,180-c.deg),rb=Math.min(best.deg,180-best.deg); if(rc<rb||(rc===rb&&c.cand.pen<best.cand.pen))best=c; }
  }
  if(lineMode){                                    // fine 1° pass to nail true horizontal
    for(let d=best.deg-2;d<=best.deg+2;d+=1){const dd=((d%180)+180)%180;const r=evalDeg(dd);
      if(r&&r.cand.pages===minPages&&r.cand.cuts<=minCuts&&r.yext<best.yext-0.5)best=r;}
  }
  if(!best){alert('লেআউট গণনা ব্যর্থ হয়েছে।');return;}
  layoutOrderSheets(best.cand.cells,best.pr,dims);   /* sheet 1 = P1's page */
  state.layout={active:true,mode:'ready',orient:'land',M:best.M,dims:dims,pr:best.pr,best:best.cand,deg:best.deg,vp:best.vp};
  inputMode(true);
  const b=document.getElementById('layoutBtn');if(b)b.style.background='#1b8a34';
  layoutDrawPreview();layoutShowPanel();
}
function layoutPrintStart(){layoutAuto();}
function _layoutPrintStartManual_unused(){
  if(state.bg!=='map'){alert('লেআউট প্রিন্ট শুধু ম্যাপ ভিউতে কাজ করে। উপরে "ম্যাপ" নির্বাচন করুন।');return;}
  layoutCancel(true);

  try{map.dragging.disable();}catch(e){}

  layoutToast('ভিউপোর্ট আঁকুন: মাউস টেনে (ড্র্যাগ) প্রিন্ট এলাকা নির্বাচন করুন। (বক্স স্ক্রিনের সমান্তরাল থাকবে)');
  if(!layoutDrawLayer)layoutDrawLayer=L.layerGroup().addTo(map);layoutDrawLayer.clearLayers();

/* Live viewport box is a plain DOM div in container pixels → always
   parallel to the window, regardless of map bearing. */
function layoutOnDown(e){if(!state.layout||state.layout.mode!=='drawing')return;
  const cp=e.containerPoint;_layoutDraw.start=cp;
  let bx=document.getElementById('layoutLiveBox');
  if(!bx){bx=document.createElement('div');bx.id='layoutLiveBox';bx.style.cssText='position:absolute;border:2px dashed #1565c0;background:rgba(21,101,192,.08);z-index:650;pointer-events:none';const mp=document.getElementById('map');if(mp)mp.appendChild(bx);}
  bx.style.display='block';bx.style.left=cp.x+'px';bx.style.top=cp.y+'px';bx.style.width='0px';bx.style.height='0px';
}
function layoutOnMove(e){if(!state.layout||state.layout.mode!=='drawing'||!_layoutDraw||!_layoutDraw.start)return;
  const s=_layoutDraw.start,cp=e.containerPoint;
  const x=Math.min(s.x,cp.x),y=Math.min(s.y,cp.y),w=Math.abs(cp.x-s.x),h=Math.abs(cp.y-s.y);

/* keep-region polygon (M coords) for one concession of one cell */
function _seamKeepPoly(cl,c,dims){
  var Wm=dims.Wm,Hm=dims.Hm,G=Wm+60;

  var sp=[];for(var p of c.pts){if(p[0]>=r0-1e-6&&p[0]<=r1+1e-6)sp.push(p);}
  var s0=_seamEval(c.pts,r0),s1=_seamEval(c.pts,r1);
  var walk=[[r0,s0]].concat(sp.filter(function(p){return p[0]>r0+1e-6&&p[0]<r1-1e-6;}),[[r1,s1]]);
  var poly=[];
  if(c.axis==='y'&&c.keep==='le'){       /* keep above (y ≤ seam): bite at bottom */
    poly=[[gx0,gy0],[gx1,gy0],[gx1,gy1],[r1,gy1]];
    for(var i=walk.length-1;i>=0;i--)poly.push([walk[i][0],walk[i][1]]);
    poly.push([r0,gy1],[gx0,gy1]);
  }else if(c.axis==='y'&&c.keep==='gt'){ /* keep below: bite at top */
    poly=[[gx0,gy1],[gx1,gy1],[gx1,gy0],[r1,gy0]];
    for(var i=walk.length-1;i>=0;i--)poly.push([walk[i][0],walk[i][1]]);
    poly.push([r0,gy0],[gx0,gy0]);
  }else if(c.axis==='x'&&c.keep==='le'){ /* keep left (x ≤ seam): bite at right */
    poly=[[gx0,gy0],[gx0,gy1],[gx1,gy1],[gx1,r1]];
    for(var i=walk.length-1;i>=0;i--)poly.push([walk[i][1],walk[i][0]]);
    poly.push([gx1,r0],[gx1,gy0]);

    poly=[[gx1,gy0],[gx1,gy1],[gx0,gy1],[gx0,r1]];

/* MARGIN/CULL FIX: load one map tile as an Image (8s timeout + one cache-busted
   retry — same semantics as the Phase 2a img retry). Resolves null on failure
   so a single bad tile just stays blank, as before. */
function _layoutLoadTile(url){

    im.onerror=function(){if(!done){done=true;clearTimeout(to);res(null);}};

/* ══════════════════════════════════════════════════════════════════════════
   PHASE 2b — STABLE PDF EXPORT (Google Maps Layout Print, deterministic path).
   Reuses the EXACT layout engine (state.layout / layoutDims / getPrintables),
   the same per-sheet projection math and the same renderStatic() overlay as the
   legacy Layout Print. The ONLY difference is the final stage: instead of
   window.print() (whose tile-decode timing and print-dialog margins/scale caused
   the intermittent white gaps and perceived road shift), each page is rasterised
   to a canvas and written straight into a multipage PDF via jsPDF — so the output
   is identical for identical drawings and independent of the browser print box.
   Basemap note: Google map tiles are not CORS-enabled, so a client-side canvas
   would be tainted and un-exportable. The PDF therefore draws its grayscale
   basemap from OpenStreetMap tiles, which use the SAME Web-Mercator z/x/y grid
   (so every geo point lands on the same pixel → conductors stay on the roads) and
   the SAME grayscale/brightness/opacity treatment, preserving the light-gray look.
   Canvas Print and the legacy Layout Print are untouched.                        */
function _ensureJsPDF(){
  return new Promise(function(res,rej){
    if(window.jspdf&&window.jspdf.jsPDF)return res(window.jspdf.jsPDF);
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=function(){(window.jspdf&&window.jspdf.jsPDF)?res(window.jspdf.jsPDF):rej(new Error('jsPDF missing'));};
    s.onerror=function(){rej(new Error('jsPDF CDN unreachable'));};
    document.head.appendChild(s);
  });
}
/* rasterise an SVG string to a decoded HTMLImageElement (same-origin/data only →
   never taints the canvas). */
function _svgToImg(svg){
  /* renderStatic() emits SVG for inline-HTML embedding: it can omit xmlns and even
     carry HTML-isms such as a duplicated attribute, both of which the strict
     data:image/svg+xml parser rejects ("svg raster failed"). Normalise it through
     the lenient HTML parser + XMLSerializer so we always feed valid, namespaced
     SVG-XML to the image. (PDF path only — renderStatic itself is untouched.) */
  try{
    var holder=document.createElement('div');holder.innerHTML=svg;
    var el=holder.querySelector('svg');
    if(el){ if(!el.getAttribute('xmlns'))el.setAttribute('xmlns','http://www.w3.org/2000/svg');
      svg=new XMLSerializer().serializeToString(el); }
    else if(svg.indexOf('xmlns=')<0){ svg=svg.replace('<svg','<svg xmlns="http://www.w3.org/2000/svg"'); }
  }catch(_){ if(svg.indexOf('xmlns=')<0)svg=svg.replace('<svg','<svg xmlns="http://www.w3.org/2000/svg"'); }
  return new Promise(function(res,rej){
    var im=new Image();
    im.onload=function(){ if(im.decode){im.decode().then(function(){res(im);},function(){res(im);});} else res(im); };
    im.onerror=function(){rej(new Error('svg raster failed'));};
    im.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
  });
}
/* load one CORS-enabled (OSM) tile; resolve null on failure after one retry so a
   missing tile leaves at most a faint gap instead of aborting the whole export. */
function _pdfTile(url){
  return new Promise(function(res){
    var tries=0;
    (function go(){
      var im=new Image();im.crossOrigin='anonymous';
      im.onload=function(){res(im);};
      im.onerror=function(){ if(tries++<1){setTimeout(go,140);} else res(null); };
      im.src=url+(url.indexOf('?')<0?'?':'&')+'_r='+tries;
    })();
  });
}
function _dataImg(uri){return new Promise(function(res){var im=new Image();im.onload=function(){res(im);};im.onerror=function(){res(null);};im.src=uri;});}
/* Header band + key-plan + page border, built as one vector SVG (same as the
   legacy composition, just expressed in SVG so it rasterises crisply). */
function _pdfChromeSVG(pw,ph,Mpx,HB,innerW,Wm,i,N,pg,kdots,kx,ky,cell,ksc,Hm){

  s+='<line x1="'+Mpx.toFixed(1)+'" y1="'+HB+'" x2="'+(Mpx+innerW).toFixed(1)+'" y2="'+HB+'" stroke="#90a4ae" stroke-width="1"/>';
  s+='<image href="'+LOGO_URI+'" x="'+(Mpx+16).toFixed(1)+'" y="'+((HB-34)/2).toFixed(1)+'" width="34" height="34" preserveAspectRatio="xMidYMid meet"/>';
  s+='<text x="'+(Mpx+60).toFixed(1)+'" y="'+(HB/2+5)+'" font-size="14" font-weight="700" fill="#0a1e3d">সাবস্টেশন: '+esc(pg.substation||'')+'</text>';
  s+='<text x="'+(Mpx+innerW/2).toFixed(1)+'" y="'+(HB/2+5)+'" font-size="14" font-weight="700" fill="#0a1e3d" text-anchor="middle">ফিডার: '+esc(pg.feeder||'')+'</text>';
  s+='<text x="'+(Mpx+innerW-16).toFixed(1)+'" y="'+(HB/2+5)+'" font-size="14" font-weight="700" fill="#0a1e3d" text-anchor="end">লেআউট শীট: '+bn(i+1)+'/'+bn(N)+' \u2022 A4 প্রস্থ='+bn(Math.round(Wm))+'মি</text>';
  /* key-plan */
  s+='<g transform="translate('+kpx.toFixed(1)+','+kpy.toFixed(1)+')">'+kdots
    +'<rect x="'+rx.toFixed(1)+'" y="'+ry.toFixed(1)+'" width="'+rw.toFixed(1)+'" height="'+rh.toFixed(1)+'" fill="rgba(229,57,53,.12)" stroke="#fff" stroke-width="3.2"/>'
    +'<rect x="'+rx.toFixed(1)+'" y="'+ry.toFixed(1)+'" width="'+rw.toFixed(1)+'" height="'+rh.toFixed(1)+'" fill="none" stroke="#e53935" stroke-width="1.6"/></g>';

  s+='<rect x="'+Mpx.toFixed(1)+'" y="0.6" width="'+innerW.toFixed(1)+'" height="'+(ph-Mpx-0.6).toFixed(1)+'" fill="none" stroke="#cfd8dc" stroke-width="1.2"/>';
  s+='</svg>';return s;
}
async function layoutExportPDF(){
  const L0=state.layout;
  if(!L0||!L0.best||!L0.best.cells.length){alert('PDF রপ্তানির মতো কোনো শীট নেই। আগে লেআউট গণনা করুন।');return;}
  let jsPDF;
  const ov=document.createElement('div');ov.style.cssText='position:fixed;inset:0;z-index:99999;background:rgba(8,18,36,.86);color:#fff;display:flex;align-items:center;justify-content:center;font:700 17px Nikosh,sans-serif;text-align:center';ov.innerHTML='<div>স্টেবল PDF তৈরি হচ্ছে…<br><span id="pdfProg" style="font-weight:400;font-size:13px">লাইব্রেরি লোড হচ্ছে</span></div>';document.body.appendChild(ov);

  catch(e){ if(ov.parentNode)ov.remove(); alert('স্টেবল PDF রপ্তানির জন্য jsPDF লাইব্রেরি লোড করা যায়নি (ইন্টারনেট প্রয়োজন)।'); return; }
  try{
    /* ---- identical layout math to layoutDoPrint ---- */
    const M=L0.M,dims=layoutDims(),pr=L0.pr,vp=L0.vp;
    const {mm,pw,ph,HB,availH,Wm,Hm}=dims;
    const cells=L0.best.cells.slice();   /* SHEET ORDER: keep canonical P1-first order */const N=cells.length;
    const EARTHC=40075016.686,DEG=Math.PI/180;
    const latMid=M.toLL((vp.x0+vp.x1)/2,(vp.y0+vp.y1)/2).lat;
    let Z=Math.round(Math.log2((pw/Wm)*Math.cos(latMid*DEG)*EARTHC/256));Z=Math.max(3,Math.min(19,Z)); /* cap 19 = OSM max native */
    const ws=256*Math.pow(2,Z),nT=Math.pow(2,Z);
    const lonLatToWorld=function(lat,lng){var x=(lng+180)/360*ws;var sin=Math.sin(lat*DEG);sin=Math.max(-0.9999,Math.min(0.9999,sin));var y=(0.5-Math.log((1+sin)/(1-sin))/(4*Math.PI))*ws;return{x:x,y:y};};
    const worldPxForWm=Wm*ws/(Math.cos(latMid*DEG)*EARTHC);
    const pageScale=pw/worldPxForWm,tilePx=256*pageScale;
    const pg=state.mapDoc;
    const Mpx=2.5*mm,innerW=pw-2*Mpx,winH=availH-Mpx;
    /* key-plan geometry (identical to legacy) */
    const anchors=pr.parts.map(p=>({x:p.x,y:p.y}));
    const bxs=anchors.map(a=>a.x).concat([vp.x0,vp.x1]),bys=anchors.map(a=>a.y).concat([vp.y0,vp.y1]);
    const kMinX=Math.min.apply(null,bxs),kMaxX=Math.max.apply(null,bxs),kMinY=Math.min.apply(null,bys),kMaxY=Math.max.apply(null,bys);
    const KW=120,KH=78,kbw=Math.max(1,kMaxX-kMinX),kbh=Math.max(1,kMaxY-kMinY),ksc=Math.min((KW-8)/kbw,(KH-8)/kbh);
    const kx=v=>4+(v-kMinX)*ksc,ky=v=>4+(v-kMinY)*ksc;
    let kdots='';anchors.forEach(a=>{kdots+='<circle cx="'+kx(a.x).toFixed(1)+'" cy="'+ky(a.y).toFixed(1)+'" r="1.3" fill="#1565c0" stroke="#fff" stroke-width="0.7"/>';});

    const SS=2.4;                                   /* supersample → ~180dpi crisp lines/text */
    const cvW=Math.round(pw*SS),cvH=Math.round(ph*SS);
    const cv=document.createElement('canvas');cv.width=cvW;cv.height=cvH;const g=cv.getContext('2d');
    const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4',compress:true});
    const PW_MM=297,PH_MM=210;
    const resetCanvas=function(){g.setTransform(SS,0,0,SS,0,0);g.clearRect(0,0,pw,ph);g.fillStyle='#fff';g.fillRect(0,0,pw,ph);};
    const addCanvasPage=function(first){const data=cv.toDataURL('image/jpeg',0.92);if(!first)pdf.addPage('a4','landscape');pdf.addImage(data,'JPEG',0,0,PW_MM,PH_MM);};

    /* ---- Grid sheets, one page at a time ---- */
    for(let i=0;i<N;i++){
      prog('শীট '+bn(i+1)+' / '+bn(N));
      const cl=cells[i],cenLat=cl.cenLat,cenLng=cl.cenLng;

        const overlaySVG=renderStatic(pg,S,S,{noHeader:true,noBg:true,noBorder:true,proj:cProjN});
        const halfW=(S/2)/pageScale,wLeft=cWorld.x-halfW,wTop=cWorld.y-halfW;
        const txMin=Math.floor(wLeft/256),txMax=Math.floor((wLeft+S/pageScale)/256),tyMin=Math.floor(wTop/256),tyMax=Math.floor((wTop+S/pageScale)/256);
        const jobs=[];for(let ty=tyMin;ty<=tyMax;ty++){if(ty<0||ty>=nT)continue;for(let tx=txMin;tx<=txMax;tx++){const txx=((tx%nT)+nT)%nT;jobs.push({px:(tx*256-wLeft)*pageScale,py:(ty*256-wTop)*pageScale,url:'https://tile.openstreetmap.org/'+Z+'/'+txx+'/'+ty+'.png'});}}

        g.save();g.beginPath();g.rect(-S/2,-S/2,S,S);g.clip();
        g.filter='grayscale(1) brightness(1.12)';g.globalAlpha=0.55;
        jobs.forEach((j,k)=>{if(imgs[k])g.drawImage(imgs[k],j.px-S/2,j.py-S/2,tilePx+0.8,tilePx+0.8);});
        g.filter='none';g.globalAlpha=1;g.restore();

        g.restore();
      } else {
        const cProj=o=>{const w=lonLatToWorld(o.lat,o.lng);return{x:(w.x-cWorld.x)*pageScale+pw/2,y:(w.y-cWorld.y)*pageScale+availH/2};};
        const overlaySVG=renderStatic(pg,Math.round(pw),Math.round(availH),{noHeader:true,noBg:true,noBorder:true,proj:cProj});
        const worldHalfW=(pw/2)/pageScale,worldHalfH=(availH/2)/pageScale,wLeft=cWorld.x-worldHalfW,wTop=cWorld.y-worldHalfH;
        const txMin=Math.floor(wLeft/256),txMax=Math.floor((wLeft+pw/pageScale)/256),tyMin=Math.floor(wTop/256),tyMax=Math.floor((wTop+availH/pageScale)/256);
        const jobs=[];for(let ty=tyMin;ty<=tyMax;ty++){if(ty<0||ty>=nT)continue;for(let tx=txMin;tx<=txMax;tx++){const txx=((tx%nT)+nT)%nT;jobs.push({px:(tx*256-wLeft)*pageScale,py:HB+(ty*256-wTop)*pageScale,url:'https://tile.openstreetmap.org/'+Z+'/'+txx+'/'+ty+'.png'});}}
        const imgs=await Promise.all(jobs.map(j=>_pdfTile(j.url)));
        g.filter='grayscale(1) brightness(1.12)';g.globalAlpha=0.55;
        jobs.forEach((j,k)=>{if(imgs[k])g.drawImage(imgs[k],j.px,j.py,tilePx+0.8,tilePx+0.8);});
        g.filter='none';g.globalAlpha=1;
        const ovImg=await _svgToImg(overlaySVG);g.drawImage(ovImg,0,HB,pw,availH);
      }
      g.restore();                                   /* end map-window clip */
      /* header + key-plan + border on top (not clipped) */
      const chrome=await _svgToImg(_pdfChromeSVG(pw,ph,Mpx,HB,innerW,Wm,i,N,pg,kdots,kx,ky,cl,ksc,Hm));
      g.drawImage(chrome,0,0,pw,ph);

    }
    prog('সংরক্ষণ হচ্ছে…');
    const fn='WZPDCL_Layout_'+String(pg.feeder||pg.substation||'sheet').replace(/[^\w\u0980-\u09FF-]+/g,'_').slice(0,40)+'.pdf';
    pdf.save(fn);
  }catch(err){ alert('PDF তৈরিতে সমস্যা হয়েছে: '+(err&&err.message||err)); }
  finally{ if(ov.parentNode)ov.remove(); if(typeof redraw==='function')redraw(); }
}

/* ── map rotation (5° steps); uses leaflet-rotate if present, else no-op ── */
function rotateMap(delta){if(state.bg!=='map')return;if(state.layout&&state.layout.active){alert('লেআউট ভিউপোর্ট সক্রিয় অবস্থায় ম্যাপ ঘোরানো যাবে না। আগে ✕ বাতিল করুন।');return;}if(typeof map.setBearing!=='function'){alert('এই সংস্করণে ম্যাপ রোটেশন উপলব্ধ নয়।');return;}delta=delta||5;var b=(((map.getBearing?map.getBearing():0)+delta)%360+360)%360;map.setBearing(b);var el=document.getElementById('rotLbl');if(el)el.textContent=bn(Math.round(b))+'°';redraw();}
function resetMapRot(){if(typeof map.setBearing==='function'){map.setBearing(0);var el=document.getElementById('rotLbl');if(el)el.textContent='০°';redraw();}}

let undoStack=[],redoStack=[];
function snapshot(){return JSON.stringify({pages:state.pages,mapDoc:state.mapDoc,uid:state.uid,unitOv:state.unitOv,customMat:state.customMat});}
function pushUndo(){undoStack.push(snapshot());if(undoStack.length>60)undoStack.shift();redoStack=[];}
function restoreState(str){const o=JSON.parse(str);if(!o||!o.pages)throw new Error('invalid');state.pages=o.pages;state.mapDoc=o.mapDoc||null;state.uid=o.uid||state.uid;state.unitOv=o.unitOv||{};state.customMat=o.customMat||[];if(typeof o.cur==='number')state.cur=o.cur;if(o.orient)state.orient=o.orient;state.sel=null;state.connectFrom=null;state.stayFrom=null;state.roadStart=null;state.jumperPts=null;state.equipFrom=null;hideProps();if(state.cur>=state.pages.length)state.cur=state.pages.length-1;if(state.cur<0)state.cur=0;document.getElementById('pageInd').textContent=`পেজ ${bn(state.cur+1)}/${bn(state.pages.length)}`;const ob=document.getElementById('orientBtn');if(ob)ob.textContent=state.orient==='land'?'⟳ ল্যান্ডস্কেপ':'⟳ পোর্ট্রেট';if(state.bg==='canvas')buildCanvasPage();redraw();}
function drawingJSON(){return JSON.stringify({v:1,saved:new Date().toISOString(),pages:state.pages,mapDoc:state.mapDoc,uid:state.uid,cur:state.cur,bg:state.bg,orient:state.orient,unitOv:state.unitOv,customMat:state.customMat});}
function saveDrawing(){try{const blob=new Blob([drawingJSON()],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);const d=new Date(),p=n=>(''+n).padStart(2,'0');a.download='wzpdcl_drawing_'+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'_'+p(d.getHours())+p(d.getMinutes())+'.json';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),3000);}catch(e){alert('সেভ ব্যর্থ: '+e.message);}}
function loadDrawingFile(input){const f=input.files&&input.files[0];if(!f){return;}const r=new FileReader();r.onload=()=>{try{restoreState(r.result);alert('ড্রয়িং লোড হয়েছে ✓');}catch(e){alert('লোড ব্যর্থ — সঠিক .json ফাইল নির্বাচন করুন।');}};r.readAsText(f);input.value='';}
const LS_KEY='wzpdcl_autosave_v1';let _asT=null;
function autoSave(){try{localStorage.setItem(LS_KEY,drawingJSON());}catch(e){}}
function autoSaveDebounced(){if(_asT)clearTimeout(_asT);_asT=setTimeout(autoSave,900);}
function autoRestore(){try{const s=localStorage.getItem(LS_KEY);if(s){restoreState(s);return true;}}catch(e){}return false;}
function undo(){if(!undoStack.length)return;redoStack.push(snapshot());restoreState(undoStack.pop());if(document.getElementById('bomModal'))reRenderPoleWindow();}
function redo(){if(!redoStack.length)return;undoStack.push(snapshot());restoreState(redoStack.pop());if(document.getElementById('bomModal'))reRenderPoleWindow();}

let locMarker=null,locWatch=null,locAcc=null;
/* Non-blocking status toast for location (replaces the old blocking alert warnings). */
function _locToast(msg,ms){
  let t=document.getElementById('locToast');
  if(!msg){ if(t)t.style.display='none'; return; }
  if(!t){t=document.createElement('div');t.id='locToast';t.style.cssText='position:fixed;left:50%;top:64px;transform:translateX(-50%);z-index:100000;background:#0a1e3d;color:#fff;padding:10px 15px;border-radius:9px;font:13px Nikosh,sans-serif;line-height:1.5;box-shadow:0 4px 18px rgba(0,0,0,.4);max-width:88vw;text-align:center';document.body.appendChild(t);}
  t.textContent=msg;t.style.display='block';
  clearTimeout(t._h); if(ms)t._h=setTimeout(function(){t.style.display='none';},ms);
}
/* Robust, mobile-friendly geolocation. Strategy: a fast first fix via
   getCurrentPosition (high accuracy), falling back to low accuracy on timeout,
   then a continuous watch. Errors are reported precisely (denied / unavailable /
   timeout) with a clear HTTPS notice on denial — because the usual reason a phone
   reports "denied" while Location is ON is that the page was opened from file:// or
   http:// (mobile browsers only allow geolocation on a secure HTTPS context).
   No blocking alert() warnings are shown. */
function locateMe(){
  if(state.bg!=='map')setBg('map');
  const btn=document.getElementById('locBtn');
  if(locWatch!==null){ try{navigator.geolocation.clearWatch(locWatch);}catch(_){}
    locWatch=null; if(locMarker){locMarker.remove();locMarker=null;} if(locAcc){locAcc.remove();locAcc=null;}
    btn.textContent='📍 আমার অবস্থান'; _locToast('',1); return; }
  if(!navigator.geolocation){ _locToast('এই ব্রাউজারে লোকেশন সাপোর্ট নেই।',5000); return; }
  btn.textContent='⏳ খোঁজা হচ্ছে…'; _locToast('আপনার অবস্থান খোঁজা হচ্ছে…',0);
  const show=function(pos){ const ll=[pos.coords.latitude,pos.coords.longitude],acc=pos.coords.accuracy||0;
    if(!locMarker){locMarker=L.circleMarker(ll,{radius:7,color:'#fff',weight:2,fillColor:'#1565c0',fillOpacity:.95}).addTo(map);map.setView(ll,18);} else locMarker.setLatLng(ll);
    if(acc){ if(!locAcc){locAcc=L.circle(ll,{radius:acc,color:'#1565c0',weight:1,fillColor:'#1565c0',fillOpacity:.08}).addTo(map);} else {locAcc.setLatLng(ll);locAcc.setRadius(acc);} }
    btn.textContent='⏹ অবস্থান বন্ধ'; _locToast('',1); };
  const fail=function(err){ btn.textContent='📍 আমার অবস্থান';
    if(locWatch!==null){try{navigator.geolocation.clearWatch(locWatch);}catch(_){}locWatch=null;}
    let m;
    if(err&&err.code===1){ const insecure=(location.protocol!=='https:'&&!/^(localhost|127\.0\.0\.1)$/.test(location.hostname));
      m=insecure?'লোকেশন ব্লকড — মোবাইল ব্রাউজার শুধু HTTPS (সিকিউর) পেজে লোকেশন দেয়। পেজটি https:// ঠিকানায় খুলুন; file:// বা http:// থেকে খুললে Location চালু থাকলেও “denied” দেখায়।':'লোকেশন অনুমতি দেওয়া হয়নি। অ্যাড্রেস বারের 🔒/ⓘ আইকন → এই সাইটের Location = Allow করে আবার চাপুন।'; }
    else if(err&&err.code===2) m='অবস্থান নির্ণয় করা গেল না — ডিভাইসের GPS/Location চালু আছে কিনা দেখে আবার চেষ্টা করুন।';
    else if(err&&err.code===3) m='GPS সিগন্যাল দুর্বল/দেরি হচ্ছে — খোলা জায়গায় গিয়ে আবার চেষ্টা করুন।';
    else m='অবস্থান পাওয়া যায়নি'+(err&&err.message?': '+err.message:'।');
    _locToast(m,11000); };
  const watch=function(hi){ locWatch=navigator.geolocation.watchPosition(show,function(e){ if(!locMarker)fail(e); },
      hi?{enableHighAccuracy:true,maximumAge:1000,timeout:20000}:{enableHighAccuracy:false,maximumAge:30000,timeout:30000}); };
  navigator.geolocation.getCurrentPosition(
    function(pos){ show(pos); watch(true); },
    function(err){ if(err&&err.code===3){ navigator.geolocation.getCurrentPosition(function(pos){show(pos);watch(false);}, fail, {enableHighAccuracy:false,maximumAge:60000,timeout:30000}); } else fail(err); },
    {enableHighAccuracy:true,maximumAge:1000,timeout:12000});
}

function matDesc(m,h,tv){m=m||'SPC';if(m==='Tower')return 'Tower - '+(tv||'?')+' kV';if(m==='NS')return 'NS';return m+' - '+(h||'?')+' মিটার';}

function makeDraggable(win,handle){handle.style.cursor='move';handle.onmousedown=function(e){if(e.target.tagName==='BUTTON')return;e.preventDefault();const r=win.getBoundingClientRect();const ox=e.clientX-r.left,oy=e.clientY-r.top;win.style.left=r.left+'px';win.style.top=r.top+'px';win.style.right='auto';win.style.transform='none';function mv(ev){win.style.left=Math.max(0,ev.clientX-ox)+'px';win.style.top=Math.max(0,ev.clientY-oy)+'px';}function up(){document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);}document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);};}

function openSpanWindow(){state._bomOpen=null;inputMode(true);const all=[];drawPages().forEach(pg=>{(pg.conductors||[]).forEach(c=>{if((c.a&&c.a.poleId)||(c.b&&c.b.poleId))all.push(c);});});

    `<div style="padding:12px 14px">`+
    `<div style="font-size:11.5px;color:#566;margin-bottom:9px">প্রতিটি স্প্যানের (পোল-জোড়ার) দৈর্ঘ্য একবার লিখে <b>Enter</b> চাপুন — একই গ্যাপের সব ভোল্টেজের কন্ডাক্টরে প্রযোজ্য হবে। উইন্ডোটি টেনে সরিয়ে অঙ্কন দেখা যাবে।${anyAuto?'<br><span style="color:#1565c0">📍 ম্যাপে আঁকা স্প্যানগুলোর দৈর্ঘ্য ম্যাপ থেকে স্বয়ংক্রিয়ভাবে পরিমাপ করে বসানো হয়েছে — যাচাই করে নিন বা প্রয়োজনে সংশোধন করুন।</span>':''}</div>`+

  return [...map.values()].sort((a,b)=>((a.ord!=null?a.ord:1e9)-(b.ord!=null?b.ord:1e9)));}
function buildBOMDoc(){
  const items=bomAggregate();if(!items.length)return null;
  const defTitle=(state.pages&&state.pages[1]&&state.pages[1].title)||'';
  let rows='',i=0,T={ins:0,rg:0,rb:0,use:0,store:0,nw:0};const CSET=condNameSet();const CX=state.condExtras||{};
  items.forEach(it=>{i++;let ins=round1(it.ins);const rg=round1(it.rg),rb=round1(it.rb);let insCell;
    const ex=CSET.has(it.name)?CX[it.name]:null;
    if(ex){const sag=+ex.sag||0,jmp=+ex.jumper||0,svc=+ex.service||0,drp=+ex.drop||0,extra=sag+jmp+svc+drp;if(extra>0){const base=ins;ins=round1(ins+extra);const parts=[];if(sag>0)parts.push('Sag: '+round1(sag));if(jmp>0)parts.push('Jumper: '+round1(jmp));if(svc>0)parts.push('Service Bale: '+round1(svc));if(drp>0)parts.push('Drop: '+round1(drp));insCell=base+' + '+parts.join(' + ')+' = '+ins;}}
    if(insCell===undefined)insCell=ins||'−';
    const use=round1(Math.min(ins,rg));const nw=round1(Math.max(0,ins-use));const store=round1(Math.max(0,rg-use)+rb);
    T.ins+=ins;T.rg+=rg;T.rb+=rb;T.use+=use;T.store+=store;T.nw+=nw;
    rows+=`<tr><td>${bn(i)}</td><td class="nm">${esc(it.name)}</td><td>${esc(it.unit)}</td><td>${insCell}</td><td>${rg||'−'}</td><td>${rb||'−'}</td><td>${use||'−'}</td><td>${store||'−'}</td><td>${nw||'−'}</td></tr>`;});
  return `<!doctype html><html lang="bn"><head><meta charset="utf-8"><title>প্রয়োজনীয় মালামালের তালিকা</title><style>
    @page{size:A4 portrait;margin:10mm 10mm 32.5mm 10mm}
    body{font-family:'Times New Roman','Noto Sans Bengali','SolaimanLipi','Siyam Rupali',serif;margin:0;padding:6px;color:#111}
    .noprint{margin:6px 0;text-align:center}.noprint button{padding:7px 16px;font-size:13px;cursor:pointer;background:#0a5a1e;color:#fff;border:none;border-radius:5px}
    .hdr{display:flex;align-items:center;gap:10px;margin-bottom:6px}
    .logo{width:62px;height:62px;object-fit:contain}
    .ttl{flex:1;text-align:center}.top{font-weight:700;font-size:15px}
    .title{display:inline-block;font-size:11px;border:1px dashed #c0c0c0;padding:2px 12px;min-width:300px;outline:none;margin-top:3px}
    table{border-collapse:collapse;width:100%;font-size:9px}
    thead{display:table-header-group}
    th,td{border:1px solid #444;padding:3px 4px;text-align:center;vertical-align:middle}
    th{background:#eef2f7;font-weight:700;line-height:1.15}
    td.nm{text-align:left}
    tr.sum td{font-weight:700;background:#fff7e6}
    .foot{margin-top:8px;font-size:9px;color:#444}
    @media print{.noprint{display:none}}
   </style></head><body>
   <div class="noprint"><button onclick="window.print()">🖨️ প্রিন্ট / PDF সংরক্ষণ (A4 Portrait)</button><span style="font-size:11px;color:#666">শিরোনাম ক্লিক করে এডিট করুন</span></div>
   <div class="hdr"><img class="logo" src="${LOGO_URI}"><div class="ttl"><div class="top">প্রয়োজনীয় মালামালের তালিকা</div><div class="title" contenteditable="true">${esc(defTitle)||'এখানে শিরোনাম লিখুন'}</div></div></div>
   <table><thead>
     <tr><th rowspan="2">ক্রমিক নং</th><th rowspan="2">মালামালের বিবরণ</th><th rowspan="2">একক</th><th rowspan="2">মোট মালামাল স্থাপন</th><th colspan="2">মালামাল উদ্ধার</th><th rowspan="2">উদ্ধারকৃত পুনঃব্যবহারযোগ্য থেকে ব্যবহার</th><th rowspan="2">মালামাল ভান্ডারে জমা</th><th rowspan="2">নতুন মালামাল বরাদ্দ</th></tr>
     <tr><th>পুনঃব্যবহারযোগ্য</th><th>ক্ষতিগ্রস্থ</th></tr>
   </thead><tbody>${rows}</tbody></table>
   <div class="foot">নোট: উদ্ধারকৃত পুনঃব্যবহারযোগ্য মালামাল আগে ব্যবহার করা হবে; ঘাটতি অংশই নতুন বরাদ্দের প্রয়োজন হবে। অবশিষ্ট পুনঃব্যবহারযোগ্য ও সমস্ত ক্ষতিগ্রস্থ মালামাল ভান্ডারে জমা হবে।</div>
   </body></html>`;
}
function generatePWM(){inputMode(false);const m=document.getElementById('bomModal');if(m)m.remove();const pwmDoc=buildPWMDoc();if(!pwmDoc){alert('সব আইটেমের যোগফল শূন্য — কিছু ইনপুট দিন।');return;}
  const bomDoc=buildBOMDoc();const w=window.open('','_blank');if(!w){alert('পপ-আপ ব্লক হয়েছে — পপ-আপ অনুমতি দিন এবং আবার চেষ্টা করুন।');return;}
  w.document.open();w.document.write(pwmDoc);w.document.close();try{w.__BOM_HTML=bomDoc;}catch(e){}}
/* Standalone view of the existing মালামালের তালিকা (same builder, same print) */
function condNameSet(){return new Set([8,9,10,11,12,19,14,20,93,94,999].map(condName).concat([condName('NS')]));}
function bomEligibleConds(){let items;try{items=bomAggregate();}catch(e){items=[];}const S=condNameSet();const seen=new Map();(items||[]).forEach(it=>{if(S.has(it.name)&&round1(it.ins)>0&&!seen.has(it.name))seen.set(it.name,round1(it.ins));});return [...seen.entries()].map(e=>({name:e[0],ins:e[1]}));}
function matListGenerate(){const html=buildBOMDoc();if(!html){alert('মালামাল তালিকার জন্য কোনো ইনপুট নেই।');return;}const w=window.open('','_blank');if(!w){alert('পপ-আপ ব্লক হয়েছে — পপ-আপ অনুমতি দিন এবং আবার চেষ্টা করুন।');return;}w.document.open();w.document.write(html);w.document.close();}
function closeMatExtras(){const m=document.getElementById('matExtrasModal');if(m)m.remove();}
function matExtrasConfirm(){state.condExtras=state.condExtras||{};const names=state._matExtraNames||[];names.forEach((nm,idx)=>{const g=f=>{const el=document.getElementById('ce_'+idx+'_'+f);return el?(parseFloat(el.value)||0):0;};const o={sag:g('sag'),jumper:g('jumper'),service:g('service'),drop:g('drop')};if(o.sag||o.jumper||o.service||o.drop)state.condExtras[nm]=o;else delete state.condExtras[nm];});closeMatExtras();matListGenerate();}
function openMaterialList(){let items;try{items=bomAggregate();}catch(e){items=[];}if(!items||!items.length){alert('মালামাল তালিকার জন্য কোনো ইনপুট নেই।');return;}
  state.condExtras=state.condExtras||{};const list=bomEligibleConds();state._matExtraNames=list.map(c=>c.name);
  const old=document.getElementById('matExtrasModal');if(old)old.remove();
  const inp=(idx,f,v)=>`<input id="ce_${idx}_${f}" type="number" min="0" step="0.1"${v?(' value="'+v+'"'):''} placeholder="0" onwheel="this.blur()" style="width:80px;padding:6px;text-align:center;border:1px solid #c3d0e2;border-radius:5px;font-size:13px"/>`;
  let body;
  if(!list.length){body=`<div style="padding:16px;color:#666;text-align:center">কোনো স্থাপনযোগ্য কন্ডাক্টর/আর্থ ওয়্যার পাওয়া যায়নি — সরাসরি তালিকা তৈরি করুন।</div>`;}
  else{body=`<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="background:#eef2f7"><th style="padding:7px;border:1px solid #d8d8d8;text-align:left">কন্ডাক্টর / আর্থ ওয়্যার</th><th style="padding:7px;border:1px solid #d8d8d8">স্যাগ</th><th style="padding:7px;border:1px solid #d8d8d8">জাম্পার</th><th style="padding:7px;border:1px solid #d8d8d8">সার্ভিস বেল স্থাপন</th><th style="padding:7px;border:1px solid #d8d8d8">ড্রপ স্থাপন</th></tr></thead><tbody>`+list.map((c,idx)=>{const ex=state.condExtras[c.name]||{};return `<tr><td style="padding:7px;border:1px solid #e3e3e3"><div style="font-weight:600">${esc(c.name)}</div><div style="font-size:11px;color:#888">প্রি-ওয়ার্ক স্থাপন: ${bn(round1(c.ins))} মিঃ</div></td><td style="padding:5px;border:1px solid #e3e3e3;text-align:center">${inp(idx,'sag',ex.sag)}</td><td style="padding:5px;border:1px solid #e3e3e3;text-align:center">${inp(idx,'jumper',ex.jumper)}</td><td style="padding:5px;border:1px solid #e3e3e3;text-align:center">${inp(idx,'service',ex.service)}</td><td style="padding:5px;border:1px solid #e3e3e3;text-align:center">${inp(idx,'drop',ex.drop)}</td></tr>`;}).join('')+`</tbody></table>`;}
  const modal=document.createElement('div');modal.id='matExtrasModal';modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99999;display:flex;align-items:center;justify-content:center;padding:18px';
  modal.innerHTML=`<div style="background:#fff;border-radius:12px;max-width:780px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 12px 40px rgba(0,0,0,.3)"><div style="padding:14px 18px;background:#0d1f38;color:#fff;border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center"><div style="font-weight:800;font-size:16px">অতিরিক্ত কন্ডাক্টর পরিমাণ (মিটার)</div><button onclick="closeMatExtras()" style="background:transparent;border:none;color:#fff;font-size:24px;cursor:pointer;line-height:1">×</button></div><div style="padding:14px 16px"><div style="font-size:12px;color:#555;margin-bottom:10px;line-height:1.55">প্রতিটি স্থাপনযোগ্য কন্ডাক্টর/আর্থ ওয়্যারের জন্য স্যাগ, জাম্পার, সার্ভিস বেল স্থাপন ও ড্রপ স্থাপন বাবদ অতিরিক্ত দৈর্ঘ্য (মিটার) দিন। খালি বা ০ হলে যোগ হবে না — এগুলো "মোট মালামাল স্থাপন" এর সাথে যোগ হবে।</div>${body}</div><div style="padding:12px 16px;border-top:1px solid #e3e7ee;display:flex;gap:9px;justify-content:flex-end"><button onclick="closeMatExtras()" style="padding:9px 16px;border:1px solid #c3d0e2;background:#f4f6f9;border-radius:7px;cursor:pointer;font-size:13px">বাতিল</button><button onclick="matExtrasConfirm()" style="padding:9px 20px;border:none;background:#0a5a1e;color:#fff;border-radius:7px;cursor:pointer;font-weight:700;font-size:13px">নিশ্চিত করে তালিকা তৈরি করুন ▶</button></div></div>`;
  document.body.appendChild(modal);
}

function copyBOM(){let out=[];const rows=[];drawPages().forEach(pg=>{(pg.poles||[]).forEach(pl=>rows.push({pl,pg}));});rows.forEach(({pl,pg},idx)=>{const lines=[];poleRowData(pl,pg).forEach(r=>{const v=rowVals(pl,r);if(+v.rec)lines.push('  উদ্ধার: '+r.name.replace(/^\d+\.\s*/,'')+' — '+v.rec+' '+r.unit+(v.c?' ('+v.c+')':''));if(+v.ins)lines.push('  স্থাপন: '+r.name.replace(/^\d+\.\s*/,'')+' — '+v.ins+' '+r.unit);});if(lines.length)out.push((pl.label||('P'+(idx+1)))+':\n'+lines.join('\n'));});
  const txt=out.join('\n\n')||'কোনো এন্ট্রি নেই';navigator.clipboard?.writeText(txt).then(()=>alert('সারাংশ কপি হয়েছে!'),()=>{});}

/* ───────── KEYBOARD ───────── */
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&(e.key==='z'||e.key==='Z')){e.preventDefault();if(e.shiftKey)redo();else undo();return;}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||e.key==='Y')){e.preventDefault();redo();return;}
  if(['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName))return;
  if(e.key==='Escape'){state.connectFrom=null;state.stayFrom=null;state.roadStart=null;state.jumperPts=null;state.equipFrom=null;state.guardFrom=null;state.isoFrom=null;state.ugFrom=null;setTool('select');}
  if((e.key==='Delete'||e.key==='Backspace')&&state.sel){removeById(state.sel);state.sel=null;hideProps();redraw();}});
/* ───────── INIT ───────── */
function init(){document.getElementById('bg-canvas').classList.add('on');document.getElementById('t-select').classList.add('on');document.getElementById('gridBtn').classList.add('on');
  document.getElementById('map').style.display='none';document.getElementById('pagebar').style.display='flex';svg.classList.add('canvasmode');
  state.cur=0;setPoleCat('existing');buildCondItems();buildAccItems();buildEquipItems();
  document.getElementById('palette').addEventListener('click',function(e){const sec=e.target.closest('.tool-sec');if(sec)enterSection(sec.id);},true);
  document.getElementById('pageInd').textContent=`পেজ ${bn(state.cur+1)}/${bn(state.pages.length)}`;buildCanvasPage();redraw();updateHints();}
window.addEventListener('wheel',function(){const a=document.activeElement;if(a&&a.tagName==='INPUT'&&a.type==='number')a.blur();},{passive:true});
window.addEventListener('resize',()=>{if(state.bg==='canvas')buildCanvasPage();else map.invalidateSize();redraw();});
init();
</script>
